# Routing: etap[.domena] -> silnik[/model]
# Rozstrzyganie: label engine:* na tickecie > projects.<projekt> > defaults.<etap.domena> > defaults.<etap>
defaults:
  plan: claude-code/sonnet
  build: codex              # bez modelu = default CLI
  verify: claude-code/sonnet
  review: claude-code/sonnet   # doradcze; niezależny od buildera (codex)
  build.frontend: codex        # sandboxowany default; Kimi wymaga jawnego FACTORY_ALLOW_UNSANDBOXED_KIMI=1

# spec: silnik[/model[@effort]]; effort: low/medium/high/xhigh (claude --effort, codex -c model_reasoning_effort)
projects:
  br-budget:
    plan: claude-code/claude-fable-5@high
    build: codex/gpt-5.6-sol@xhigh
    build.frontend: claude-code/claude-opus-4-8@high   # kimi poza br-budget do czasu dual-planowania (decyzja 2026-07-20)
    verify: claude-code/claude-opus-4-8@high
    review: claude-code/claude-fable-5@medium
    # fix idzie trasą build (ta sama reguła co w pipeline)
