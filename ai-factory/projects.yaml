pilot-app:
  statuses: extended   # tablica Linear odzwierciedla fazy fabryki
  max_concurrent_tickets: 2   # BAR-122: równoległość ponad 2 rozjeżdżała maina (noc 2026-07-22)
  repo: /Users/senioraiconsultant/Development/Edu/ai-sdlc/pilot-app
  github: bartoszrychlicki/pilot-app
  default_branch: main
  checks:
    - npm ci
    - npm run build
    - npm test
  ci:
    requiredChecks:
      - quality
    timeoutMinutes: 20
  verify:
    budgetMinutes: 15   # BAR-170: pi/qwen lokalny model ubijany po 5 min na dużym diffie (BAR-165)
  screenshot:
    start: npx vite preview --port 4173 --strictPort
    url: http://localhost:4173/

br-budget:
  max_concurrent_tickets: 1   # produkcyjne repo — jeden ticket naraz do czasu dojrzałości merge-queue
  repo: /Users/senioraiconsultant/Development/Clients/Bartosz/br-budget
  github: bartoszrychlicki/br-budget
  default_branch: main
  checks:
    - npm ci
    - npm run lint
    - npm run build
    - npm run test
  ci:
    requiredChecks:
      - quality
    timeoutMinutes: 30
  # bez screenshot: next dev/start wymaga env i bazy — do włączenia świadomie później
  # premium modele (fable/opus/sol@xhigh): pełny cykl kosztuje ~$5-6 ekwiwalentu — default $3 ubił BAR-92 po zielonym buildzie
  budget:
    maxUsd: 8
    maxMinutes: 60
  qa:
    # runda 1: pełna suita e2e na świeżym checkoutcie w verify (50 testów ~2 min, plikowa SQLite, zero sekretów)
    e2e: E2E_BROWSER_CHANNEL=bundled npm run e2e:local
    prodChecks:
      # do cutovera DNS (BAR-77/102) ten check FAILuje — i słusznie: deploye nie docierają na prod
      - name: apex serwuje deployment Vercel (nie stary Cloudflare Pages)
        url: https://budget.bartoszrychlicki.com
        headerIncludes: x-vercel-id
      - name: strona resetu hasła istnieje
        url: https://budget.bartoszrychlicki.com/reset-password
        headerIncludes: x-vercel-id

# Fabryka rozwija samą siebie. Repo wskazuje root Git, nie podkatalog ai-factory,
# dzięki czemu worktree obejmuje także workflow CI i dokumentację projektu.
br-factory:
  statuses: extended
  max_concurrent_tickets: 1
  repo: /Users/senioraiconsultant/Development/Edu/ai-sdlc
  github: bartoszrychlicki/ai-software-factory
  default_branch: main
  checks:
    - npm --prefix ai-factory ci
    - npm --prefix ai-factory run check
    - npm --prefix ai-factory test
    - npm --prefix ai-factory run build
  ci:
    requiredChecks:
      - quality
    timeoutMinutes: 20
  # Brak screenshot/prodChecks: lokalne Studio jest współdzieloną usługą na 4111,
  # więc uruchamianie drugiego egzemplarza z worktree kolidowałoby z produkcyjnym pollerem.
